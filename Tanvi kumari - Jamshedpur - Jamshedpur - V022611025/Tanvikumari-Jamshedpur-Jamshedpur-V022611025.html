<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tanvi kumari - Study Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #F97315;
      --primary-glow: rgba(249, 115, 21, 0.2);
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-hover: #f9f9fa;
      --border: rgba(0, 0, 0, 0.08);
      --text: #111827;
      --text-muted: #6b7280;
      --glass-bg: rgba(255, 255, 255, 0.85);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(249, 115, 21, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(249, 115, 21, 0.05) 0%, transparent 50%);
    }
    nav {
      position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between;
      align-items: center; padding: 0 40px; height: 80px; background: var(--glass-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 16px; text-decoration: none; color: var(--text);  }
    
    .logo { height: 48px; width: auto; object-fit: contain; filter: drop-shadow(0 4px 12px var(--primary-glow)); }
    .brand span { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }
    .brand em { font-style: normal; color: var(--primary); }
    .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px 24px 100px; }
    .hero-section { text-align: center; margin-bottom: 60px;  }
    .tag {
      display: inline-flex; align-items: center; gap: 10px; background: rgba(249, 115, 21, 0.1);
      border: 1px solid rgba(249, 115, 21, 0.2); color: var(--primary); font-size: 0.85rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 8px 20px;
      border-radius: 999px; margin-bottom: 24px; box-shadow: 0 0 20px rgba(249, 115, 21, 0.1);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary);  }
    h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.1; letter-spacing: -1px; margin-bottom: 20px; }
    h1 b { background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 .highlight { background: linear-gradient(135deg, var(--primary) 0%, #ff9d4d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 10px rgba(249,115,21,0.2)); }
    .sub { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; line-height: 1.6; }
    .stats { display: flex; justify-content: center; gap: 40px; margin-top: 40px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .stat .num { font-size: 2.5rem; font-weight: 800; color: var(--text); text-shadow: 0 0 20px rgba(255,255,255,0.1); }
    .stat .lab { font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    .controls { margin: 60px auto 40px; max-width: 600px; position: relative; }
    .search {
      width: 100%; height: 64px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); padding: 0 24px 0 60px; font-size: 1.1rem;
      outline: none;  font-family: inherit; backdrop-filter: blur(10px);
    }
    .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; color: var(--text-muted); pointer-events: none;  }
    .search:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 0 4px rgba(249, 115, 21, 0.15), 0 10px 30px rgba(0,0,0,0.5); }
    .search:focus + .search-icon { color: var(--primary); }
    .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .head h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; color: var(--text); }
    .count { font-size: 0.9rem; font-weight: 500; color: var(--text-muted); padding: 6px 16px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; perspective: 1000px; }
    .card {
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
      text-decoration: none; color: var(--text); background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; padding: 24px; 
      position: relative; overflow: hidden; backdrop-filter: blur(10px);
    }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top right, rgba(249,115,21,0.1), transparent 50%); opacity: 0;  }
    
    
    .badge { align-self: flex-start; font-size: 0.75rem; font-weight: 700; color: var(--primary); background: rgba(249,115,21,0.1); padding: 4px 12px; border-radius: 999px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .avatar {
      width: 80px; height: 80px; border-radius: 6px; background: linear-gradient(135deg, var(--primary), #b34e00);
      display: grid; place-items: center; color: #fff; font-size: 2rem; font-weight: 700; margin-bottom: 16px; box-shadow: 0 8px 16px rgba(249, 115, 21, 0.2);
    }
    .name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0; color: var(--text); line-height: 1.3; }
    .meta { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-muted); }
    .meta-icon { width: 16px; height: 16px; opacity: 0.7; }
    .empty { display: none; text-align: center; padding: 60px 20px; background: var(--surface); border-radius: 8px; border: 1px dashed var(--border); margin-top: 24px; }
    .empty h3 { font-size: 1.5rem; margin-bottom: 8px; color: var(--text); }
    .empty p { color: var(--text-muted); }
    footer { margin-top: 80px; padding: 30px 0; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 16px; color: var(--text-muted); font-size: 0.9rem; }
    @media (max-width: 768px) { .wrap { padding: 20px 12px 60px; } nav { padding: 0 12px; height: 60px; } .logo { height: 32px; } .brand span { font-size: 1.2rem; } .stats { gap: 12px; } .stat .num { font-size: 1.5rem; } h1 { font-size: 1.8rem; margin-bottom: 12px; } .sub { font-size: 0.95rem; } .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } .card { padding: 12px 16px; gap: 12px; } .avatar { width: 72px; height: 72px; font-size: 1.8rem; border-radius: 6px; margin-bottom: 8px; } .name { font-size: 1.05rem; } .meta { flex-direction: column; gap: 4px; align-items: flex-start; } .meta-item span { font-size: 0.8rem; } .meta-icon { width: 14px; height: 14px; } }
  
    .card { aspect-ratio: 1 / 1; justify-content: center; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="#">
      <img src="https://res.cloudinary.com/dxwszplz7/image/upload/v1772276441/Vardaan_Comet-removebg-preview_dsut6f.png" alt="Vardaan Comet Logo" class="logo">
      <span>Vardaan <em class="highlight">Comet</em></span>
    </a>
  </nav>

  <main class="wrap">


    <div class="head">
      <h2>Subjects Directory</h2>
      <span id="countLabel" class="count">0 subjects</span>
    </div>

    <section class="grid" id="subjectGrid"></section>

    <section class="empty" id="emptyState">
      <h3>No subjects found</h3>
      <p>Try searching for a different name.</p>
    </section>


  </main>
  <script>
    const subjects = [];

    function initials(name) {
      return name.split(' ').map(part => part[0]).join('').slice(0, 2).toUpperCase();
    }

    const subjectImages = {
      'current affairs': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1759763329/current_affairs_q12cip.png',
      'civics and history': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1757176494/civics_and_history_nl6lnm.jpg',
      'histry and civics': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1757176494/civics_and_history_nl6lnm.jpg',
      'extra resources': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1757013643/extra_resources_gl2vba.jpg',
      'worksheet': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1757013643/extra_resources_gl2vba.jpg',
      'economics': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1755455100/conomics_jwb2wv.jpg',
      'science': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363614/science_cjdndm.png',
      'physics': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363614/science_cjdndm.png',
      'chemistry': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363614/science_cjdndm.png',
      'biology': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363614/science_cjdndm.png',
      'pc': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363613/pc_qzuswm.png',
      'computer': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363613/pc_qzuswm.png',
      'maths': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363612/maths_u9nmij.png',
      'mathematics': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363612/maths_u9nmij.png',
      'history': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363611/history_f9lgfe.png',
      'grammar': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363610/GrammarLanguage_w7qszs.png',
      'geography': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363609/geography_shfqrc.png',
      'english': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363608/English_Language_x7iejs.png',
      'civics': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1751363607/civics_mnw9ja.png',
      'sst': 'https://res.cloudinary.com/dxwszplz7/image/upload/v1757176494/civics_and_history_nl6lnm.jpg'
    };

    function getSubjectIcon(name) {
      const lowerName = name.toLowerCase();
      for (const [key, url] of Object.entries(subjectImages)) {
        if (lowerName.includes(key)) {
          return `<img src="${url}" alt="${name}" style="width:100%; height:100%; object-fit:cover; border-radius: 6px;">`;
        }
      }
      return initials(name);
    }

    function renderCards(list) {
      const grid = document.getElementById('subjectGrid');
      const emptyState = document.getElementById('emptyState');
      const countLabel = document.getElementById('countLabel');
      
      grid.innerHTML = '';
      
      if (!list.length) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        countLabel.textContent = '0 subjects';
        return;
      }
      
      grid.style.display = 'grid';
      emptyState.style.display = 'none';
      countLabel.textContent = list.length + ' subject' + (list.length === 1 ? '' : 's');
      
      list.forEach(subject => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = subject.link;
        
        card.innerHTML = `
          <div class="avatar">${getSubjectIcon(subject.name)}</div>
          <div class="name">${subject.name}</div>
        `;
        grid.appendChild(card);
      });
    }


    
    // Initialize
    renderCards(subjects);
  </script>
</body>
</html>
