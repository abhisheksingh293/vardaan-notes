<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astuti Jha - Study Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #F97315;
      --primary-glow: rgba(249, 115, 21, 0.4);
      --bg: #0d0d12;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8f8f8;
      --text-muted: #a0a0b0;
      --glass-bg: rgba(13, 13, 18, 0.7);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(249, 115, 21, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(249, 115, 21, 0.05) 0%, transparent 50%);
    }
    nav {
      position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between;
      align-items: center; padding: 0 40px; height: 80px; background: var(--glass-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 16px; text-decoration: none; color: var(--text); transition: transform 0.3s ease; }
    .brand:hover { transform: scale(1.02); }
    .logo { height: 48px; width: auto; object-fit: contain; filter: drop-shadow(0 4px 12px var(--primary-glow)); }
    .brand span { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }
    .brand em { font-style: normal; color: var(--primary); }
    .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 60px 24px 100px; }
    .hero-section { text-align: center; margin-bottom: 60px; animation: fadeInDown 0.8s ease-out forwards; }
    .tag {
      display: inline-flex; align-items: center; gap: 10px; background: rgba(249, 115, 21, 0.1);
      border: 1px solid rgba(249, 115, 21, 0.2); color: var(--primary); font-size: 0.85rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 8px 20px;
      border-radius: 999px; margin-bottom: 24px; box-shadow: 0 0 20px rgba(249, 115, 21, 0.1);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }
    h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.1; letter-spacing: -1px; margin-bottom: 20px; }
    h1 b { background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 .highlight { background: linear-gradient(135deg, var(--primary) 0%, #ff9d4d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 10px rgba(249,115,21,0.2)); }
    .sub { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; line-height: 1.6; }
    .stats { display: flex; justify-content: center; gap: 40px; margin-top: 40px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .stat .num { font-size: 2.5rem; font-weight: 800; color: var(--text); text-shadow: 0 0 20px rgba(255,255,255,0.1); }
    .stat .lab { font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    .controls { margin: 60px auto 40px; max-width: 600px; position: relative; }
    .search {
      width: 100%; height: 64px; border-radius: 16px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); padding: 0 24px 0 60px; font-size: 1.1rem;
      outline: none; transition: all 0.3s ease; font-family: inherit; backdrop-filter: blur(10px);
    }
    .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; color: var(--text-muted); pointer-events: none; transition: color 0.3s ease; }
    .search:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 0 4px rgba(249, 115, 21, 0.15), 0 10px 30px rgba(0,0,0,0.5); }
    .search:focus + .search-icon { color: var(--primary); }
    .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .head h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; color: var(--text); }
    .count { font-size: 0.9rem; font-weight: 500; color: var(--text-muted); padding: 6px 16px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; perspective: 1000px; }
    .card {
      display: flex; flex-direction: column; text-decoration: none; color: var(--text); background: var(--surface);
      border: 1px solid var(--border); border-radius: 24px; padding: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden; backdrop-filter: blur(10px);
    }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top right, rgba(249,115,21,0.1), transparent 50%); opacity: 0; transition: opacity 0.4s ease; }
    .card:hover { transform: translateY(-8px) scale(1.02); border-color: rgba(249, 115, 21, 0.3); background: var(--surface-hover); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(249,115,21,0.1); }
    .card:hover::before { opacity: 1; }
    .badge { align-self: flex-start; font-size: 0.75rem; font-weight: 700; color: var(--primary); background: rgba(249,115,21,0.1); padding: 4px 12px; border-radius: 999px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .avatar {
      width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), #b34e00);
      display: grid; place-items: center; color: #fff; font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; box-shadow: 0 8px 16px rgba(249, 115, 21, 0.2);
    }
    .name { font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .meta { display: flex; flex-direction: column; gap: 8px; }
    .meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-muted); }
    .meta-icon { width: 16px; height: 16px; opacity: 0.7; }
    .empty { display: none; text-align: center; padding: 60px 20px; background: var(--surface); border-radius: 24px; border: 1px dashed var(--border); margin-top: 24px; }
    .empty h3 { font-size: 1.5rem; margin-bottom: 8px; color: var(--text); }
    .empty p { color: var(--text-muted); }
    footer { margin-top: 80px; padding: 30px 0; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 16px; color: var(--text-muted); font-size: 0.9rem; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 21, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(249, 115, 21, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 21, 0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { .wrap { padding: 40px 16px 80px; } nav { padding: 0 20px; } .stats { gap: 20px; } .stat .num { font-size: 2rem; } h1 { font-size: 2.2rem; } }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="#">
      <img src="https://res.cloudinary.com/dxwszplz7/image/upload/v1772276441/Vardaan_Comet-removebg-preview_dsut6f.png" alt="Vardaan Comet Logo" class="logo">
      <span>Vardaan <em class="highlight">Comet</em></span>
    </a>
  </nav>

  <main class="wrap">
    <div class="hero-section">
      <h1><b><span class="highlight">Astuti Jha</span></b></h1>
      <p class="sub">Choose a subject to open chapter dropdowns and chapter notes.</p>
      
      <div class="stats">
        <div class="stat"><div class="num" id="statSubjects">2</div><div class="lab">Subjects</div></div>
        <div class="stat"><div class="num" id="statChapters">17</div><div class="lab">Chapters</div></div>
      </div>
    </div>


    <div class="head">
      <h2>Subjects Directory</h2>
      <span id="countLabel" class="count">2 subjects</span>
    </div>

    <section class="grid" id="subjectGrid"></section>

    <section class="empty" id="emptyState">
      <h3>No subjects found</h3>
      <p>Try searching for a different name.</p>
    </section>

    <footer>
      <span>Created by Team Vardaan</span>
      <span>•</span>
      <span>Study Portal</span>
      <span>•</span>
      <span>© 2026</span>
    </footer>
  </main>
  <script>
    const subjects = [
    {
        "name": "Geography",
        "link": "./Geography/Geography.html",
        "chapters": 7
    },
    {
        "name": "History",
        "link": "./History/History.html",
        "chapters": 10
    }
];

    function initials(name) {
      return name.split(' ').map(part => part[0]).join('').slice(0, 2).toUpperCase();
    }

    function renderCards(list) {
      const grid = document.getElementById('subjectGrid');
      const emptyState = document.getElementById('emptyState');
      const countLabel = document.getElementById('countLabel');
      
      grid.innerHTML = '';
      
      if (!list.length) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        countLabel.textContent = '0 subjects';
        return;
      }
      
      grid.style.display = 'grid';
      emptyState.style.display = 'none';
      countLabel.textContent = list.length + ' subject' + (list.length === 1 ? '' : 's');
      
      list.forEach(subject => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = subject.link;
        
        card.innerHTML = `
          <span class="badge">Subject</span>
          <div class="avatar">${initials(subject.name)}</div>
          <div class="name">${subject.name}</div>
          <div class="meta">
            <div class="meta-item">
              <svg class="meta-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" />
              </svg>
              <span>${subject.chapters} chapter folder${subject.chapters === 1 ? '' : 's'}</span>
            </div>
            <div class="meta-item">
              <svg class="meta-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
              </svg>
              <span>Click to open subject page</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }


    
    // Initialize
    renderCards(subjects);
  </script>
</body>
</html>
