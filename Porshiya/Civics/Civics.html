<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porshiya - Civics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --orange:#f97315; --orange-soft:rgba(249,115,21,.12); }
    [data-theme="dark"] { --bg:#0c0c0e; --text:#f3f3f5; --muted:#9a9aad; --card:#151519; --line:rgba(255,255,255,.08); --card-hover:#1b1b20; --nav:rgba(12,12,14,.86); --input:rgba(255,255,255,.04); --orb1:rgba(249,115,21,.16); --orb2:rgba(249,115,21,.08); }
    [data-theme="light"] { --bg:#f4f4f7; --text:#121217; --muted:#66667a; --card:#ffffff; --line:rgba(0,0,0,.09); --card-hover:#fdfdfd; --nav:rgba(244,244,247,.9); --input:#ffffff; --orb1:rgba(249,115,21,.12); --orb2:rgba(249,115,21,.07); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    .orb { position:fixed; border-radius:50%; filter:blur(72px); pointer-events:none; z-index:0; }
    .orb.a { width:500px; height:500px; right:-120px; top:-140px; background:var(--orb1); }
    .orb.b { width:340px; height:340px; left:-100px; bottom:-80px; background:var(--orb2); }
    nav { position:sticky; top:0; z-index:20; height:66px; padding:0 26px; display:flex; align-items:center; justify-content:space-between; background:var(--nav); border-bottom:1px solid var(--line); backdrop-filter:blur(14px); }
    .brand { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); }
    .logo { width:36px; height:36px; border-radius:11px; display:grid; place-items:center; background:linear-gradient(135deg,#f97315,#d65b00); color:#fff; font-family:'Syne',sans-serif; font-weight:800; }
    .brand span { font-family:'Syne',sans-serif; font-weight:800; letter-spacing:-.02em; }
    .brand em { color:var(--orange); font-style:normal; }
    .toggle { width:52px; height:28px; border-radius:999px; border:1px solid var(--line); background:var(--input); position:relative; cursor:pointer; }
    .knob { position:absolute; width:20px; height:20px; border-radius:50%; top:3px; left:3px; background:linear-gradient(135deg,#f97315,#e15f00); transition:transform .28s ease; }
    [data-theme="light"] .knob { transform:translateX(24px); }
    .wrap { position:relative; z-index:1; max-width:980px; margin:0 auto; padding:32px 26px 80px; }
    .toprow { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .eyebrow { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:6px 14px; font-size:.74rem; font-weight:700; text-transform:uppercase; color:var(--orange); background:var(--orange-soft); border:1px solid rgba(249,115,21,.25); }
    .pulse { width:6px; height:6px; border-radius:50%; background:var(--orange); }
    .back { text-decoration:none; color:var(--text); font-size:.86rem; border:1px solid var(--line); border-radius:10px; padding:8px 12px; background:var(--input); }
    h1 { margin-top:18px; font-family:'Syne',sans-serif; font-size:clamp(1.9rem,4.8vw,3rem); line-height:1.06; letter-spacing:-.03em; }
    h1 .accent { color:var(--orange); }
    .sub { margin-top:12px; color:var(--muted); max-width:640px; line-height:1.6; }
    .stats { margin-top:26px; display:flex; gap:24px; flex-wrap:wrap; }
    .num { font-family:'Syne',sans-serif; font-size:1.55rem; font-weight:800; }
    .lab { font-size:.74rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .controls { margin-top:30px; }
    .search { width:100%; height:46px; border:1px solid var(--line); border-radius:12px; background:var(--input); color:var(--text); font-size:.94rem; padding:0 14px; outline:none; }
    .search:focus { border-color:rgba(249,115,21,.55); box-shadow:0 0 0 3px rgba(249,115,21,.12); }
    .head { margin-top:22px; display:flex; justify-content:space-between; align-items:center; }
    .head h2 { font-family:'Syne',sans-serif; font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .count { font-size:.82rem; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:4px 10px; background:var(--input); }
    .chapter-list { margin-top:14px; display:grid; gap:12px; }
    details { background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
    summary { cursor:pointer; list-style:none; padding:14px 16px; font-family:'Syne',sans-serif; font-weight:700; }
    summary::-webkit-details-marker { display:none; }
    .dropdown { padding:12px 16px; border-top:1px solid var(--line); color:var(--muted); font-size:.9rem; }
    .note-link { display:inline-block; margin-top:10px; text-decoration:none; color:var(--text); background:var(--orange-soft); border:1px solid rgba(249,115,21,.25); border-radius:10px; padding:8px 12px; }
    .note-link:hover { border-color:rgba(249,115,21,.45); }
    .empty { display:none; text-align:center; color:var(--muted); margin-top:38px; }
    footer { margin-top:38px; padding-top:22px; border-top:1px solid var(--line); display:flex; justify-content:center; gap:10px; flex-wrap:wrap; color:var(--muted); font-size:.82rem; }
    @media (max-width:520px) { .wrap { padding:22px 16px 60px; } nav { padding:0 16px; } }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <nav>
    <a class="brand" href="#">
      <div class="logo">VC</div>
      <span>Vardaan <em>Comet</em></span>
    </a>
    <div class="toggle" id="themeToggle"><div class="knob"></div></div>
  </nav>
  <main class="wrap">
    <div class="toprow">
      <div class="eyebrow"><span class="pulse"></span>Subject Portal</div>
      <a class="back" href="../Porshiya.html">Back to Subjects</a>
    </div>
    <h1><span class="accent">Civics</span><br />Chapter Dashboard</h1>
    <p class="sub">Click a chapter to open the dropdown, then open Chapter Notes.</p>
    <div class="stats">
      <div><div class="num" id="statChapters">0+</div><div class="lab">Chapters</div></div>
      <div><div class="num" id="statNotes">0+</div><div class="lab">Notes Pages</div></div>
    </div>
    <div class="controls">
      <input id="searchInput" class="search" type="search" placeholder="Search chapter name..." autocomplete="off" />
    </div>
    <div class="head">
      <h2>Chapters</h2>
      <span id="countLabel" class="count">0 chapters</span>
    </div>
    <section id="chapterList" class="chapter-list"></section>
    <section class="empty" id="emptyState">
      <h3>No chapters found</h3>
      <p>Try typing a different chapter name.</p>
    </section>
    <footer>
      <span>Porshiya</span>
      <span>|</span>
      <span>Civics</span>
      <span>|</span>
      <span>© 2026</span>
    </footer>
  </main>
  <script>
    const chapters = [
      {"name":"C1_The Constitution of India","notes":"./C1_The%20Constitution%20of%20India/ChapterNotes.html"},
      {"name":"C2_Directive Principles of State Policy","notes":"./C2_Directive%20Principles%20of%20State%20Policy/ChapterNotes.html"}
    ];
    const html = document.documentElement;
    function setTheme(theme) { html.setAttribute('data-theme', theme); localStorage.setItem('vcTheme', theme); }
    setTheme(localStorage.getItem('vcTheme') || 'dark');
    document.getElementById('themeToggle').addEventListener('click', () => { setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); });
    function renderStats() { document.getElementById('statChapters').textContent = chapters.length + '+'; document.getElementById('statNotes').textContent = chapters.length + '+'; }
    function renderChapters(list) {
      const container = document.getElementById('chapterList');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('countLabel');
      container.innerHTML = '';
      if (!list.length) { container.style.display = 'none'; empty.style.display = 'block'; count.textContent = '0 chapters'; return; }
      container.style.display = 'grid'; empty.style.display = 'none'; count.textContent = list.length + ' chapter' + (list.length === 1 ? '' : 's');
      list.forEach(chapter => {
        const details = document.createElement('details');
        details.innerHTML = '<summary>' + chapter.name + '</summary>' + '<div class="dropdown">Click below to open notes for this chapter.<br><a class="note-link" href="' + chapter.notes + '">Open Chapter Notes</a></div>';
        container.appendChild(details);
      });
    }
    function filterChapters() { const q = document.getElementById('searchInput').value.toLowerCase().trim(); renderChapters(chapters.filter(ch => ch.name.toLowerCase().includes(q))); }
    document.getElementById('searchInput').addEventListener('input', filterChapters);
    renderStats();
    renderChapters(chapters);
  </script>
</body>
</html>
