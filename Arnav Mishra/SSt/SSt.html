<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnav Mishra - SSt</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --orange:#F97315; --orange-soft:rgba(249,115,21,.12); }
    [data-theme="dark"] {
      --bg:#0b0b0d; --card:#151519; --line:rgba(255,255,255,.1); --text:#f4f4f6; --muted:#9f9fb1;
      --nav:rgba(11,11,13,.82); --input:rgba(255,255,255,.04); --orb1:rgba(249,115,21,.16); --orb2:rgba(249,115,21,.08);
    }
    [data-theme="light"] {
      --bg:#f5f5f7; --card:#fff; --line:rgba(0,0,0,.1); --text:#111116; --muted:#626276;
      --nav:rgba(245,245,247,.9); --input:#fff; --orb1:rgba(249,115,21,.12); --orb2:rgba(249,115,21,.07);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .orb{position:fixed;border-radius:50%;filter:blur(74px);pointer-events:none;z-index:0}
    .orb.a{width:460px;height:460px;background:var(--orb1);top:-120px;right:-90px}
    .orb.b{width:340px;height:340px;background:var(--orb2);left:-100px;bottom:-60px}
    nav{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:64px;background:var(--nav);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#F97315,#d96000);display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Syne',sans-serif}
    .brand span{font-family:'Syne',sans-serif;font-weight:800}
    .brand em{font-style:normal;color:var(--orange)}
    .toggle{width:52px;height:28px;border-radius:999px;border:1px solid var(--line);background:var(--input);position:relative;cursor:pointer}
    .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#F97315,#db6200);transition:.28s}
    [data-theme="light"] .knob{transform:translateX(24px)}
    .wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:28px 24px 80px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .tag{display:inline-flex;gap:8px;align-items:center;background:var(--orange-soft);border:1px solid rgba(249,115,21,.25);color:var(--orange);font-size:.74rem;font-weight:700;text-transform:uppercase;padding:6px 14px;border-radius:999px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--orange)}
    .back{color:var(--text);text-decoration:none;font-size:.85rem;border:1px solid var(--line);padding:8px 12px;border-radius:10px;background:var(--input)}
    h1{margin-top:18px;font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);line-height:1.06;letter-spacing:-.03em}
    h1 b{color:var(--orange)}
    .sub{margin-top:12px;color:var(--muted);max-width:700px;line-height:1.6}
    .stats{display:flex;gap:24px;margin-top:24px;flex-wrap:wrap}
    .stat .num{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
    .stat .lab{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .controls{margin-top:30px}
    .search{width:100%;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--input);color:var(--text);padding:0 14px;font-size:.95rem;outline:none}
    .search:focus{border-color:rgba(249,115,21,.55);box-shadow:0 0 0 3px rgba(249,115,21,.12)}
    .head{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
    .head h2{font-family:'Syne',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .count{font-size:.82rem;color:var(--muted);padding:4px 10px;border:1px solid var(--line);border-radius:999px;background:var(--input)}
    .chapter-list{margin-top:14px;display:grid;gap:12px}
    details{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
    summary{cursor:pointer;list-style:none;padding:14px 16px;font-family:'Syne',sans-serif;font-weight:700}
    summary::-webkit-details-marker{display:none}
    .dropdown{padding:12px 16px;border-top:1px solid var(--line);color:var(--muted);font-size:.9rem}
    .note-link{display:inline-block;margin-top:10px;text-decoration:none;color:var(--text);background:var(--orange-soft);border:1px solid rgba(249,115,21,.25);border-radius:10px;padding:8px 12px}
    .note-link:hover{border-color:rgba(249,115,21,.45)}
    .empty{display:none;text-align:center;color:var(--muted);margin-top:38px}
    footer{margin-top:38px;padding-top:22px;border-top:1px solid var(--line);display:flex;justify-content:center;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.82rem}
    @media (max-width:520px){ .wrap{padding:22px 16px 60px} nav{padding:0 16px} }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <nav>
    <a class="brand" href="#">
      <div class="logo">VC</div>
      <span>Vardaan <em>Comet</em></span>
    </a>
    <div class="toggle" id="themeToggle"><div class="knob"></div></div>
  </nav>
  <main class="wrap">
    <div class="top">
      <div class="tag"><span class="dot"></span>Subject Portal</div>
      <a class="back" href="../ArnavMishra.html">Back to Subjects</a>
    </div>
    <h1><b>SSt</b><br>Chapter Dashboard</h1>
    <p class="sub">Click a chapter to open the dropdown, then open Chapter Notes.</p>
    <div class="stats">
      <div class="stat"><div class="num" id="statChapters">0+</div><div class="lab">Chapters</div></div>
      <div class="stat"><div class="num" id="statNotes">0+</div><div class="lab">Notes Pages</div></div>
    </div>
    <div class="controls">
      <input id="searchInput" class="search" type="search" placeholder="Search chapter name..." autocomplete="off" />
    </div>
    <div class="head">
      <h2>Chapters</h2>
      <span id="countLabel" class="count">0 chapters</span>
    </div>
    <section id="chapterList" class="chapter-list"></section>
    <section class="empty" id="emptyState">
      <h3>No chapters found</h3>
      <p>Try typing a different chapter name.</p>
    </section>
    <footer>
      <span>Arnav Mishra</span>
      <span>|</span>
      <span>SSt</span>
      <span>|</span>
      <span>© 2026</span>
    </footer>
  </main>
  <script>
    const chapters = [{"name":"C1_Resources Utilisation and Development","notes":"./C1_Resources%20Utilisation%20and%20Development/ChapterNotes.html"},{"name":"C10_Colonialism Rural and Tribal Societies","notes":"./C10_Colonialism%20Rural%20and%20Tribal%20Societies/ChapterNotes.html"},{"name":"C11_The First War of Independence 1857","notes":"./C11_The%20First%20War%20of%20Independence%201857/ChapterNotes.html"},{"name":"C12_Impact of British Rule on India","notes":"./C12_Impact%20of%20British%20Rule%20on%20India/ChapterNotes.html"},{"name":"C13_Colonialism and Urban Change","notes":"./C13_Colonialism%20and%20Urban%20Change/ChapterNotes.html"},{"name":"C14_The Nationalist Movement 1870 to 1947","notes":"./C14_The%20Nationalist%20Movement%201870%20to%201947/ChapterNotes.html"},{"name":"C15_India Marches Ahead","notes":"./C15_India%20Marches%20Ahead/ChapterNotes.html"},{"name":"C16_Our Constitution","notes":"./C16_Our%20Constitution/ChapterNotes.html"},{"name":"C17_Fundamental Rights Duties and Directive Principles","notes":"./C17_Fundamental%20Rights%20Duties%20and%20Directive%20Principles/ChapterNotes.html"},{"name":"C18_The Union Government The Legislature","notes":"./C18_The%20Union%20Government%20The%20Legislature/ChapterNotes.html"},{"name":"C19_The Union Government The Executive","notes":"./C19_The%20Union%20Government%20The%20Executive/ChapterNotes.html"},{"name":"C2_Natural Resources Land Soil and Water","notes":"./C2_Natural%20Resources%20Land%20Soil%20and%20Water/ChapterNotes.html"},{"name":"C20_The Union Government The Judiciary","notes":"./C20_The%20Union%20Government%20The%20Judiciary/ChapterNotes.html"},{"name":"C21_Social Justice and the Marginalised","notes":"./C21_Social%20Justice%20and%20the%20Marginalised/ChapterNotes.html"},{"name":"C22_Safeguarding the Marginalised","notes":"./C22_Safeguarding%20the%20Marginalised/ChapterNotes.html"},{"name":"C3_Natural Resources Vegetation and Wildlife","notes":"./C3_Natural%20Resources%20Vegetation%20and%20Wildlife/ChapterNotes.html"},{"name":"C4_Mineral and Energy Resources","notes":"./C4_Mineral%20and%20Energy%20Resources/ChapterNotes.html"},{"name":"C5_Agriculture","notes":"./C5_Agriculture/ChapterNotes.html"},{"name":"C6_Manufacturing Industries","notes":"./C6_Manufacturing%20Industries/ChapterNotes.html"},{"name":"C7_Human Resources","notes":"./C7_Human%20Resources/ChapterNotes.html"},{"name":"C8_The Modern Period","notes":"./C8_The%20Modern%20Period/ChapterNotes.html"},{"name":"C9_Establishment of Company Rule in India","notes":"./C9_Establishment%20of%20Company%20Rule%20in%20India/ChapterNotes.html"}];
    const html = document.documentElement;
    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('vcTheme', theme);
    }
    setTheme(localStorage.getItem('vcTheme') || 'dark');
    document.getElementById('themeToggle').addEventListener('click', () => {
      setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    function renderStats() {
      document.getElementById('statChapters').textContent = chapters.length + '+';
      document.getElementById('statNotes').textContent = chapters.length + '+';
    }
    function renderChapters(list) {
      const container = document.getElementById('chapterList');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('countLabel');
      container.innerHTML = '';
      if (!list.length) {
        container.style.display = 'none';
        empty.style.display = 'block';
        count.textContent = '0 chapters';
        return;
      }
      container.style.display = 'grid';
      empty.style.display = 'none';
      count.textContent = list.length + ' chapter' + (list.length === 1 ? '' : 's');
      list.forEach(chapter => {
        const details = document.createElement('details');
        details.innerHTML =
          '<summary>' + chapter.name + '</summary>' +
          '<div class="dropdown">' +
            'Click below to open notes for this chapter.<br>' +
            '<a class="note-link" href="' + chapter.notes + '">Open Chapter Notes</a>' +
          '</div>';
        container.appendChild(details);
      });
    }
    function filterChapters() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const filtered = chapters.filter(ch => ch.name.toLowerCase().includes(q));
      renderChapters(filtered);
    }
    document.getElementById('searchInput').addEventListener('input', filterChapters);
    renderStats();
    renderChapters(chapters);
  </script>
</body>
</html>
